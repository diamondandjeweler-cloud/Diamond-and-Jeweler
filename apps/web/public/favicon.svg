<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="fav-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2260"/>
      <stop offset="1" stop-color="#3e4fd3"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#fav-grad)"/>
  <!-- Diamond crown -->
  <polygon points="13,30 32,10 51,30" fill="rgba(245,247,255,0.18)" stroke="#f5f7ff" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="13" y1="30" x2="51" y2="30" stroke="#f5f7ff" stroke-width="2" opacity="0.7"/>
  <!-- Diamond pavilion -->
  <polygon points="13,30 51,30 32,54" fill="rgba(245,247,255,0.32)" stroke="#f5f7ff" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Sparkle -->
  <circle cx="25" cy="20" r="2.5" fill="#f5f7ff" opacity="0.75"/>
</svg>
