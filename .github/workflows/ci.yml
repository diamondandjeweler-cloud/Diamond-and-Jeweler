name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web — typecheck + lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: ci-anon-key
          VITE_SITE_URL: http://localhost:3000
        run: npm run build

  e2e:
    name: Playwright smoke (no-backend)
    runs-on: ubuntu-latest
    needs: web
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Build web
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: ci-anon-key
          VITE_SITE_URL: http://localhost:3000
        run: npm run build
      - name: Start preview server
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: ci-anon-key
          VITE_SITE_URL: http://localhost:3000
        run: npm run preview &
      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000
      - name: Run smoke tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  migrations:
    name: Migrations — SQL lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify migration files are numbered + pair
        run: |
          set -euo pipefail
          cd supabase/migrations
          ls | sort -c       # alphabetical order == numerical order
          for f in *.sql; do
            test -s "$f" || { echo "empty migration: $f"; exit 1; }
          done
          echo "✓ $(ls *.sql | wc -l) migration file(s) present"
