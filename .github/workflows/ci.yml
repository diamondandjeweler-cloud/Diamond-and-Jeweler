name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web — typecheck + lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: ci-anon-key
          VITE_SITE_URL: http://localhost:3000
        run: npm run build

  e2e:
    name: Playwright smoke (no-backend)
    runs-on: ubuntu-latest
    needs: web
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Build web
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: ci-anon-key
          VITE_SITE_URL: http://localhost:3000
        run: npm run build
      - name: Start preview server
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: ci-anon-key
          VITE_SITE_URL: http://localhost:3000
        run: npm run preview &
      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000
      - name: Run smoke tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  migrations:
    name: Migrations — SQL lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify migration files are numbered + pair
        run: |
          set -euo pipefail
          cd supabase/migrations
          ls | sort -c       # alphabetical order == numerical order
          for f in *.sql; do
            test -s "$f" || { echo "empty migration: $f"; exit 1; }
          done
          echo "✓ $(ls *.sql | wc -l) migration file(s) present"

      - name: No NEW duplicate migration number prefixes
        run: |
          set -euo pipefail
          cd supabase/migrations
          allow=.known-duplicates
          # Filenames that share a 4-digit prefix with at least one sibling,
          # in the current tree (this is the same metric the allow-list captures).
          current_dups=$(ls *.sql \
            | sed -E 's/^([0-9]{4})_.*/\1/' \
            | sort | uniq -d \
            | while read -r p; do ls "${p}"_*.sql; done \
            | sort)
          # The grandfathered set: non-comment, non-blank lines from the allow-list.
          if [ -f "$allow" ]; then
            allowed=$(grep -vE '^\s*(#|$)' "$allow" | sort)
          else
            allowed=""
          fi
          # Anything duplicated today that is NOT in the allow-list is a NEW dup.
          new_dups=$(comm -23 <(printf '%s\n' "$current_dups") <(printf '%s\n' "$allowed"))
          if [ -n "$new_dups" ]; then
            echo "✗ NEW duplicate migration number prefix(es) detected:"
            echo "$new_dups" | sed 's/^/    /'
            echo ""
            echo "Renumber the new migration to a unique 4-digit prefix, or — if the"
            echo "duplicate is intentional — add its filename to"
            echo "supabase/migrations/.known-duplicates in the same PR."
            exit 1
          fi
          echo "✓ no new duplicate migration prefixes (legacy duplicates allow-listed)"

  db-apply:
    name: Migrations — apply to ephemeral Postgres
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Apply EVERY migration to a throwaway local Supabase Postgres so a broken
      # or non-idempotent migration fails CI instead of production. The official
      # CLI's `db start` boots the local stack (Docker is preinstalled on the
      # GitHub ubuntu-latest runner) and `db reset` re-runs all migrations from
      # scratch against it. If the full stack ever proves too heavy/flaky for the
      # runner, the lighter fallbacks are `supabase db lint` or a psql dry-run
      # against a bare `postgres:15` service — kept here as a documented option.
      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase stack
        run: supabase start
      - name: Apply all migrations (reset re-runs every migration)
        run: supabase db reset
      - name: Column-isolation gate (BLOCKING)
        # Hard gate on the audit's #1 risk: the 3×-recurring ic_path /
        # internal_reasoning / life_chart_score column leak must never reach prod.
        # Pure has_column_privilege() catalog assertions — no fixtures, no side
        # effects — so it is safe to BLOCK on (unlike the fixtured suite below,
        # which stays advisory until a green reset run is observed). See
        # supabase/tests/column_isolation.sql.
        run: |
          DB_URL=$(supabase status -o env | grep '^DB_URL=' | cut -d= -f2- | tr -d '"')
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/column_isolation.sql
      - name: RLS deny/allow invariant suite (BLOCKING)
        # Pins the highest-value authz invariants (a user cannot read another's
        # ic_path / talents / consults; decrypt_dob is not executable by the
        # authenticated role; no RLS recursion). Self-contained + ROLLBACKs, so it
        # leaves the reset DB untouched. ON_ERROR_STOP makes a failing assertion
        # exit non-zero. See supabase/tests/rls_deny.sql (AUDIT D5).
        #
        # NOW BLOCKING: this suite was wired ADVISORY (continue-on-error) on the
        # premise it had never executed against the reset DB. It has since stayed
        # green for 20+ commits, confirming the green fresh-reset run the header
        # waited on. It is self-contained + re-runnable (ROLLBACKs), so promoting
        # it to a hard gate is safe — a failed authz invariant now turns CI RED
        # instead of merging silently (road95, task#2-b3).
        continue-on-error: false
        run: |
          DB_URL=$(supabase status -o env | grep '^DB_URL=' | cut -d= -f2- | tr -d '"')
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/rls_deny.sql
      - name: Payment exactly-once (idempotency) money-path suite (BLOCKING)
        # Proves the double-credit guard the audit flagged: the conditional
        # `UPDATE ... WHERE payment_status='pending' RETURNING id` flip + the
        # award_points 'point_purchase:<id>' idempotency key credit EXACTLY ONCE
        # across a replayed webhook (1st flip → 1 row, 2nd → 0; ledger has one
        # credit; increment_extra_matches_used advances quota once). This is the
        # seeded-DB integration proof that payment-webhook.test.ts explicitly
        # defers to a harness (see its header) — the Deno suite only covers the
        # signature algorithm. Self-contained (seeds its own fixtures) + ROLLBACKs,
        # and asserts pure exactly-once LOGIC against the freshly-reset DB, so it is
        # safe to BLOCK on. See supabase/tests/payment_idempotency.sql.
        run: |
          DB_URL=$(supabase status -o env | grep '^DB_URL=' | cut -d= -f2- | tr -d '"')
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/payment_idempotency.sql
      - name: Post-deploy index existence gate (BLOCKING)
        # Proves the talent pre-filter indexes (idx_talents_open /
        # idx_talents_salary_min / idx_talents_emp_type) from
        # supabase/post_deploy/0001_concurrently_indexes.sql still compile against
        # the migrated schema and are present + VALID. Those indexes were authored
        # as CREATE INDEX CONCURRENTLY inside migration 0074, so `db reset` never
        # creates them (CONCURRENTLY errors inside the per-migration transaction);
        # the test re-creates them plain (empty CI table → instant) and asserts
        # the catalog state. Catches a column rename/drop breaking the post-deploy
        # script BEFORE it fails a prod deploy. See supabase/tests/postdeploy_indexes.sql.
        run: |
          DB_URL=$(supabase status -o env | grep '^DB_URL=' | cut -d= -f2- | tr -d '"')
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/postdeploy_indexes.sql
      - name: Lint migrated schema
        run: supabase db lint --level warning
      - name: Stop local stack
        if: always()
        run: supabase stop --no-backup

  edge-tests:
    name: Edge functions — Deno money-path tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run all edge-function Deno tests
        # Runs EVERY *.test.ts under supabase/functions (recursively) so any new
        # edge test is picked up automatically — not just payment-webhook.
        #   • payment-webhook.test.ts — 16 money-path invariants (Billplz HMAC +
        #     timingSafeEqual signature/replay/malformed). Pure crypto, no net/DB.
        #     The complementary seeded-Postgres exactly-once proof
        #     (payment_status='pending' flip + award_points idempotency-key +
        #     increment_extra_matches_used quota) runs in the db-apply job as
        #     supabase/tests/payment_idempotency.sql.
        #   • match-core / matcher orchestration tests added under the
        #     road-to-95 testing track land here automatically.
        # --no-check: run the test assertions without deno's strict type-check of
        # the whole imported edge tree. Edge type-checking is not a CI gate today
        # (the web job covers apps/web), and type-checking all of match-core's
        # casts here would risk turning this job red on pre-existing edge type
        # looseness rather than on a real test failure.
        run: deno test --allow-all --no-check supabase/functions/
      - name: verify_jwt pin invariant (BLOCKING)
        # The invariant that prevents the payment-webhook 401 class of bug:
        # every signature-verified webhook (imports webhookCorsHeaders) and every
        # service-role-gated endpoint (calls requireServiceRole) must be pinned
        # `verify_jwt = false` in supabase/config.toml — else the gateway 401s the
        # JWT-less caller before the handler's own check runs. Pure Node stdlib
        # (no DB, no deps); node is preinstalled on ubuntu-latest.
        run: node supabase/tests/config_jwt_pins.test.mjs

  drift:
    name: Migrations — prod-vs-repo drift (advisory)
    runs-on: ubuntu-latest
    # Advisory: prod intentionally trails the repo by ~40 versions today (DB
    # changes are applied manually via the Management API, not `db push`), so a
    # red result here is informational, not a merge blocker. It surfaces the
    # split-brain drift the audit flagged as un-monitored. Becomes a no-op when
    # the Management API token is not configured (e.g. forks / PRs from forks).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Skip if no Supabase access token
        id: guard
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "SUPABASE_ACCESS_TOKEN not set — skipping drift check."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Report prod-vs-repo migration drift
        if: steps.guard.outputs.run == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/check-migration-drift.mjs

  secrecy:
    name: Secrecy — no BaZi terms in user-visible text
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Grep user-visible surfaces for forbidden terms
        run: |
          set -euo pipefail
          # Forbidden user-visible terms (case-insensitive): bazi / 八字 /
          # life chart / life-chart / fortune. Scope = the React JSX surfaces
          # (apps/web/src/**/*.tsx) plus the DSR export Edge Function. Internal
          # code identifiers / comments are allowed, so we drop lines that are:
          #   - import statements (path/identifier mentions), and
          #   - the known code-identifier spellings (camelCase / snake_case /
          #     PascalCase forms of lifeChartCharacter, life_chart_character, etc.)
          # which are columns/helpers, not user-facing copy.
          pattern='bazi|八字|life[ -]?chart|fortune'
          files=$( { find apps/web/src -type f -name '*.tsx'; \
                     find supabase/functions/dsr-export -type f -name '*.ts'; } 2>/dev/null )
          hits=$(grep -inE "$pattern" $files 2>/dev/null \
            | grep -viE '^[^:]+:[0-9]+:[[:space:]]*import' \
            | grep -viE 'lifeChartCharacter|LifeChartCharacter|life_chart_character|life_chart_bucket' \
            || true)
          if [ -n "$hits" ]; then
            echo "✗ Forbidden secrecy term(s) found on user-visible surface(s):"
            echo "$hits" | sed 's/^/    /'
            echo ""
            echo "These words must never appear in UI text, consent, exports, or"
            echo "notifications. Use neutral copy ('AI-powered matching',"
            echo "'compatibility signal'). Internal code identifiers/columns are"
            echo "fine — if this is a false positive on an identifier, refine the"
            echo "allow filter in .github/workflows/ci.yml."
            exit 1
          fi
          echo "✓ no forbidden secrecy terms on user-visible surfaces"

  security:
    name: Security — dependency + secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: npm audit (high+), non-blocking
        working-directory: apps/web
        run: npm audit --audit-level=high || true
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
