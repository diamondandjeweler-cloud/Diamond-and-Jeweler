<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2260"/>
      <stop offset="1" stop-color="#3e4fd3"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Diamond icon -->
  <g transform="translate(450, 140)">
    <polygon points="0,120 150,0 300,120" fill="rgba(245,247,255,0.18)" stroke="#f5f7ff" stroke-width="6" stroke-linejoin="round"/>
    <line x1="0" y1="120" x2="300" y2="120" stroke="#f5f7ff" stroke-width="5" opacity="0.7"/>
    <polygon points="0,120 300,120 150,280" fill="rgba(245,247,255,0.32)" stroke="#f5f7ff" stroke-width="6" stroke-linejoin="round"/>
    <circle cx="80" cy="65" r="14" fill="#f5f7ff" opacity="0.7"/>
  </g>

  <!-- Title -->
  <text x="600" y="465" font-family="system-ui, sans-serif" font-size="72" font-weight="700" fill="#ffffff" text-anchor="middle">Diamond &amp; Jeweler</text>
  <text x="600" y="540" font-family="system-ui, sans-serif" font-size="36" font-weight="400" fill="rgba(255,255,255,0.75)" text-anchor="middle">Malaysia's Premier Jewellery Talent Platform</text>
</svg>
